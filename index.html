<!DOCTYPE HTML>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width initial-scale=1.0">
        <title>mRich</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="notepad">
            <div id="bodytext" contenteditable="true" autocorrect="off" spellcheck="false"></div>
            <button id="save"></button>
        </div>
        <div id="optionbg"></div>
        <div id="optionContainer">
            <button id="options"></button>
            <div id="tools">
                <div class="format" id="bold"><b>Bold</b></div>
                <div class="format" id="italic"><i>Italic</i></div>
                <div class="format" id="underline"><u>Underline</u></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
